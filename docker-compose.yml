version: "3.9"
services:
  laundry-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laundry-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
